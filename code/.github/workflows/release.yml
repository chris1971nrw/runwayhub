name: Automatic Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: runwayhub.tar.gz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: *** secrets.GITHUB_TOKEN }}
