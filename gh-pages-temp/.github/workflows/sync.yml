name: OpenAIP Data Sync

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
    - cron: '0 22 * * *'   # Daily at 22:00 Berlin time
  workflow_dispatch:
    inputs:
      forceSync:
        description: 'Force immediate sync'
        required: false
        type: boolean

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json, mysql

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction

      - name: Create OpenAIP sync script
        run: |
          cat > sync-openaip.php << 'EOF'
          <?php
          // OpenAIP Data Sync Script
          // Downloads OpenAIP data and stores in local database

          // Configuration
          $openaipUrl = getenv('OPENAIP_API_URL') ?: 'http://openaip.net';
          $apiKey = getenv('OPENAIP_API_KEY') ?: '';

          // Endpoints to sync
          $endpoints = [
              'airports',
              'waypoints',
              'airways',
              'navaids'
          ];

          // Mock data for demo (replace with actual API calls in production)
          echo "Syncing OpenAIP data...";
          foreach ($endpoints as $endpoint) {
              echo " - $endpoint: OK\n";
          }
          echo "Sync completed successfully!\n";
          exit(0);
          ?>
          EOF
      - name: Run sync (demo mode)
        env:
          OPENAIP_API_URL: 'http://openaip.net'
        run: php sync-openaip.php

      - name: Check for failures
        if: failure()
        run: |
          echo "Sync failed. Please check the error logs."
          exit 1

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: sync OpenAIP data'

      - name: Deploy to Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
