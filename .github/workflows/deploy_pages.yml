name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:
    inputs:
      message:
        description: 'Manual deployment message'
        required: false
        default: 'Manual deployment'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  DEPLOY_BRANCH: gh-pages

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm ci || echo "No package.json, skipping npm install"
          npm install --save-dev serve || echo "No package.json"
        continue-on-error: true
      
      - name: Create gh-pages directory
        run: mkdir -p gh-pages
      
      - name: Copy public assets to gh-pages
        run: |
          cp -r public/* gh-pages/ 2>/dev/null || true
          cp -r runwayhub/* gh-pages/ 2>/dev/null || true
          cp -r docs/* gh-pages/ 2>/dev/null || true
          cp -r code/* gh-pages/ 2>/dev/null || true
          echo "Deployment completed at $(date -u)"
          echo "View at: https://runwayhub.github.io"
      
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages
          force_or_create: true
          commit_message: ${{ github.event.inputs.message || 'Deploy to GitHub Pages' }}
          
      - name: Generate sitemap
        run: |
          cat > gh-pages/sitemap.xml << 'EOF'
<?xml version="1.0" encoding="UTF-8"?>
<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">
  <url><loc>https://runwayhub.github.io/</loc><lastmod>2026-05-28</lastmod><priority>1.0</priority></url>
  <url><loc>https://runwayhub.github.io/landing/</loc><lastmod>2026-05-28</lastmod><priority>0.9</priority></url>
  <url><loc>https://runwayhub.github.io/dashboard.php</loc><lastmod>2026-05-28</lastmod><priority>0.8</priority></url>
  <url><loc>https://runwayhub.github.io/api-docs/</loc><lastmod>2026-05-28</lastmod><priority>0.7</priority></url>
</urlset>
EOF
        continue-on-error: true
      
      - name: Deploy sitemap
        run: cp public/sitemap.xml gh-pages/sitemap.xml || true
        continue-on-error: true
