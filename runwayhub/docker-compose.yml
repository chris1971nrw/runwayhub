version: '3.8'

services:
  # Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    volumes:
      - .:/var/www/html:cached
      - ./runwayhub/database:/var/www/html/database:cached
      - ./runwayhub/storage:/var/www/html/storage:cached
      - ./runwayhub/logs:/var/www/html/logs:cached
    environment:
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY}
    depends_on:
      - db
    networks:
      - runwayhub-network

  # MySQL/MariaDB Database
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_DATABASE:-runwayhub}
      MYSQL_USER: ${DB_USER:-runwayhub}
      MYSQL_PASSWORD: ${DB_PASSWORD:-runwayhub}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./runwayhub/database/migrations:/docker-entrypoint-initdb.d:cached
    ports:
      - "3306:3306"
    networks:
      - runwayhub-network

  # Redis for Caching (optional)
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - runwayhub-network

  # PHPMyAdmin for Database Management
  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: ${DB_USER:-runwayhub}
      PMA_PASSWORD: ${DB_PASSWORD:-runwayhub}
    depends_on:
      - db
    networks:
      - runwayhub-network

  # Nginx for Production (optional)
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./runwayhub/public:/var/www/html:cached
    depends_on:
      - app
    networks:
      - runwayhub-network

networks:
  runwayhub-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data: