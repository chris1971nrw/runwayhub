version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: runwayhub_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    volumes:
      - ./database.sqlite:/app/database.sqlite
      - ./logs:/app/logs
      - ./uploads:/app/uploads
      - ./config/config.php:/app/config/config.php:ro
    env_file:
      - .env
    environment:
      - APP_NAME=RunwayHub
      - APP_PORT=8080
      - DB_PATH=/app/database.sqlite
      - SMTP_HOST=smtp.example.com
      - SMTP_PORT=587
      - MAILER_DOMAIN=runwayhub.example.com
      - ALLOW_REGISTRATION=false
      - ALLOW_BOOKING=false
    depends_on:
      - php-fpm
    networks:
      - runwayhub

  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: runwayhub_php
    restart: unless-stopped
    volumes:
      - ./database.sqlite:/app/database.sqlite
      - ./config/config.php:/app/config/config.php
      - ./database/init.php:/app/database/init.php
      - ./database/seed.php:/app/database/seed.php
      - ./logs:/app/logs
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      - APP_NAME=RunwayHub
      - APP_PORT=8080
      - DB_PATH=/app/database.sqlite
      - SMTP_HOST=smtp.example.com
      - MAILER_DOMAIN=runwayhub.example.com
    networks:
      - runwayhub

networks:
  runwayhub:
    driver: bridge
