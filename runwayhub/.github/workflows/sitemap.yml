name: Generate Sitemap

on:
  push:
    branches: [main, dev]
  schedule:
    - cron: '0 */3 * * *'  # Every 3 hours for fresh data
  workflow_dispatch:

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install generate-sitemap
        run: npm install -g @actions/generate-sitemap

      - name: Generate Sitemap
        run: |
          sitemap --all

      - name: Output Sitemap
        run: cat sitemap/index.xml

      - name: Upload Sitemap
        uses: actions/upload-artifact@v4
        with:
          name: sitemap
          path: sitemap/

      - name: Commit and push Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update sitemap'
          file_pattern: 'sitemap.xml'

      - name: Notify Sitemap Updated
        run: |
          echo "Sitemap updated successfully!"
          echo "Last modification: $(date -Iseconds)"
          echo "All pages indexed."